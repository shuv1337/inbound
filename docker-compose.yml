services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env.production
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file: .env.production
    environment:
      POSTGRES_DB: inbound
      POSTGRES_USER: inbound
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inbound -d inbound"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:2026.2.1
    command: tunnel --config /etc/cloudflared/config.yml run
    environment:
      TUNNEL_URL: http://app:3000
    volumes:
      - /opt/inbound/cloudflared:/etc/cloudflared:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata:
